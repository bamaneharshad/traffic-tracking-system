<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TrafficTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🚦</div>
      <span class="auth-logo-name">TrafficTrack</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
      <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- Login Form -->
    <form class="auth-form active" id="formLogin" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;" id="loginBtn">
        Sign In
      </button>
      <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">
        Don't have an account? <a href="#" onclick="switchTab('register')" style="color:var(--accent);font-weight:600;">Create one</a>
      </p>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="formRegister" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="regName" class="form-control" placeholder="John Smith" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <select id="regRole" class="form-control">
          <option value="citizen">Citizen</option>
          <option value="officer">Traffic Officer</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;" id="regBtn">
        Create Account
      </button>
      <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">
        Already have an account? <a href="#" onclick="switchTab('login')" style="color:var(--accent);font-weight:600;">Sign in</a>
      </p>
    </form>

  </div>
</div>

<script src="js/app.js"></script>
<script>
  Theme.init();

  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  // Switch between login and register tabs
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('formLogin').classList.toggle('active', isLogin);
    document.getElementById('formRegister').classList.toggle('active', !isLogin);
  }

  // Handle login
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Signing in…';
    btn.disabled = true;

    const { ok, data } = await apiFetch('/auth/login', {
      method: 'POST',
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      })
    });

    if (ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      Toast.success('Welcome back!', `Signed in as ${data.user.name || data.user.email}`);
      setTimeout(() => window.location.href = 'dashboard.html', 600);
    } else {
      Toast.error('Sign in failed', data.message || 'Invalid credentials');
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }

  // Handle register
  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    btn.textContent = 'Creating account…';
    btn.disabled = true;

    const { ok, data } = await apiFetch('/auth/register', {
      method: 'POST',
      body: JSON.stringify({
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value,
        role: document.getElementById('regRole').value,
      })
    });

    if (ok) {
      Toast.success('Account created!', 'Please sign in with your new account.');
      setTimeout(() => switchTab('login'), 800);
    } else {
      Toast.error('Registration failed', data.message || 'Please try again');
    }

    btn.textContent = 'Create Account';
    btn.disabled = false;
  }
</script>
</body>
</html>
