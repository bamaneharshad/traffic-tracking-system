services:
  - type: web
    name: traffic-backend
    env: python
    plan: free

    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app"

    envVars:
      - key: PYTHON_VERSION
        value: 3.10

      - key: DATABASE_URL
        sync: false

      - key: SECRET_KEY
        generateValue: true